<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 class="logo">MyApp</h2>

        <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>
        <a href="{{ url_for('students') }}">📋 Students</a>
        <a href="{{ url_for('add_student') }}">➕ Add Student</a>
        <a href="{{ url_for('admin_dashboard') }}" class="active">👑 Admin Panel</a>
        <a href="{{ url_for('logout') }}" class="logout">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <h3>Admin Panel</h3>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <div class="content-header">
                <h2>All Users</h2>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                    </tr>
                </thead>

                <tbody>
                    {% if users %}
                        {% for u in users %}
                        <tr>
                            <td>{{ u.id }}</td>
                            <td>{{ u.username }}</td>
                            <td>
                                {% if u.role == 'admin' %}
                                    👑 Admin
                                {% else %}
                                    👤 User
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="3" class="empty">No users found</td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>

        </div>

    </div>

</div>

</body>
</html>
